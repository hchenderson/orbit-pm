<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#6857d9" />
    <title>Orbit is offline</title>
    <style>
      *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;color:#302e38;background:#faf9fb;font:15px/1.55 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(430px,100%);padding:34px;border:1px solid #e7e4eb;border-radius:18px;background:white;box-shadow:0 18px 55px rgba(41,38,54,.09)}.mark{width:45px;height:45px;display:grid;place-items:center;color:white;border-radius:14px;background:#6857d9;font-weight:800}h1{margin:22px 0 8px;font-size:27px;letter-spacing:-.8px}p{margin:0;color:#777480}button{margin-top:24px;padding:11px 16px;color:white;border:0;border-radius:9px;background:#6857d9;font:inherit;font-weight:700;cursor:pointer}
    </style>
  </head>
  <body><main class="card"><div class="mark">O</div><h1>You’re offline</h1><p>Previously opened Orbit data is still available inside the app. Reconnect to open a new page or sync your latest changes.</p><button onclick="location.reload()">Try again</button></main></body>
</html>
