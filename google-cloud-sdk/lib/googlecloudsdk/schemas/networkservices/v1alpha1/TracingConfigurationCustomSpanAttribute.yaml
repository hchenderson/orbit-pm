$schema: "http://json-schema.org/draft-06/schema#"

title: networkservices v1alpha1 TracingConfigurationCustomSpanAttribute export schema
description: A gcloud export/import command YAML validation schema.
type: object
required:
- attributeName
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  attributeName:
    description: |-
      Defines the key for a custom attribute that is added to the trace spans
      generated by the Google Cloud Load Balancer (GCLB).
    type: string
  fromHeaderValue:
    description: |-
      Specifies an incoming request header name from which the value for the
      custom span attribute should be dynamically extracted. Note: the value of
      the header might be changed during the request processing; in this case
      the resulting value will be stored.
    type: string
  literalValue:
    description: |-
      Assigns a static, constant value to the custom trace span attribute
      defined by the corresponding attribute_name.
    type: string
