$schema: "http://json-schema.org/draft-06/schema#"

title: networkservices v1beta1 ExpressLinkDestination export schema
description: A gcloud export/import command YAML validation schema.
type: object
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  services:
    description: |-
      The service URIs to which the ExpressLink resource is bound. Can be one of
      the following (all the service URIs should have the same type):
      `//compute.googleapis.com/projects/*/regions/*/serviceAttachments/`;
      `//compute.googleapis.com/projects/*/regions/*/forwardingRules/`;
      `//run.googleapis.com/projects/*/locations/*/services/`.
    type: array
    items:
      type: string
