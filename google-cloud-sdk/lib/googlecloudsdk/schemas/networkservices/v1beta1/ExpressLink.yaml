$schema: "http://json-schema.org/draft-06/schema#"

title: networkservices v1beta1 ExpressLink export schema
description: A gcloud export/import command YAML validation schema.
type: object
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  description:
    description: |-
      A free-text description of the resource. Max length 1024 characters.
    type: string
  destination:
    description: The destination service(s) for this binding.
    $ref: ExpressLinkDestination.yaml
  etag:
    description: |-
      Etag of the resource. If this is provided, it must match the server's
      etag. If the provided etag does not match the server's etag, the request
      will fail with a 409 ABORTED error.
    type: string
  labels:
    description: Set of label tags associated with the ExpressLink resource.
    $ref: LabelsValue.yaml
  matches:
    description: |-
      A list of matches define conditions used to match requests to destination
      services. Each match is independent with the OR semantic, i.e. we consider
      it matched if ANY one of the matches is satisfied. This field is only
      applicable to Cloud Run services: If an ExpressLink has only one Cloud Run
      service, Match is optional. If not specified, the default hostname
      `-..run.app` or the short name can be used. If an ExpressLink has multiple
      Cloud Run services, at least one Match with valid hostname is required.
    type: array
    items:
      $ref: ExpressLinkMatch.yaml
  name:
    description: |-
      Identifier. Name of the ExpressLink resource. It matches pattern
      `projects/*/locations/*/expressLinks/`.
    type: string
  source:
    description: The source service(s) for this binding.
    $ref: ExpressLinkSource.yaml
