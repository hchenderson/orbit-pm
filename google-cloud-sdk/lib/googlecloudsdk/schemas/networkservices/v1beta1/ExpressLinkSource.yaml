$schema: "http://json-schema.org/draft-06/schema#"

title: networkservices v1beta1 ExpressLinkSource export schema
description: A gcloud export/import command YAML validation schema.
type: object
additionalProperties: false
properties:
  COMMENT:
    type: object
    description: User specified info ignored by gcloud import.
    additionalProperties: false
    properties:
      template-id:
        type: string
      region:
        type: string
      description:
        type: string
      date:
        type: string
      version:
        type: string
  UNKNOWN:
    type: array
    description: Unknown API fields that cannot be imported.
    items:
      type: string
  services:
    description: |-
      A list of resources attached to the ExpressLink. The resources can be
      Cloud Run services of the format:
      `//run.googleapis.com/projects/*/locations/*/services/`. The location of
      the resources must match the location of the ExpressLink (unless the
      ExpressLink is global).
    type: array
    items:
      type: string
