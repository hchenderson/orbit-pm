- release_tracks: [ALPHA, BETA, GA]
  help_text:
    brief: |
      List Data Lineage events.
    description: |
      List all Data Lineage events under the specified run.
    examples: |
      To list lineage events under run 'my-run', process 'my-process' in location 'us-central1', run:

          $ {command} --run=my-run --process=my-process --location=us-central1

  arguments:
    resource:
      spec: !REF googlecloudsdk.command_lib.datalineage.resources:run
      help_text: |
        The run to list lineage events for.

  request:
    collection: datalineage.projects.locations.processes.runs.lineageEvents

  response:
    id_field: name

  output:
    format: |
      table(
        name.basename():label=EVENT_ID,
        startTime,
        endTime
      )
