- release_tracks: [ALPHA, BETA, GA]

  help_text:
    brief: Update a data lineage run.
    description: Update a data lineage run.
    examples: |
      To update the display name and state of a run:

        $ {command} my-run --process=my-process --location=us-central1 --display-name="New Name" --state=completed

  arguments:
    resource:
      spec: !REF googlecloudsdk.command_lib.datalineage.resources:run
      help_text: The run to update.

    params:
    - arg_name: display-name
      api_field: googleCloudDatacatalogLineageV1Run.displayName
      help_text: The new display name of the run.

    - arg_name: state
      api_field: googleCloudDatacatalogLineageV1Run.state
      help_text: The new state of the run.
      choices:
      - arg_value: unknown
        enum_value: UNKNOWN
      - arg_value: started
        enum_value: STARTED
      - arg_value: completed
        enum_value: COMPLETED
      - arg_value: failed
        enum_value: FAILED
      - arg_value: aborted
        enum_value: ABORTED

    - arg_name: end-time
      api_field: googleCloudDatacatalogLineageV1Run.endTime
      help_text: The end time of the run.

    - arg_name: attributes
      api_field: googleCloudDatacatalogLineageV1Run.attributes.additionalProperties
      help_text: The new attributes of the run. This will replace any existing attributes.
      type:
        arg_dict:
          flatten: true
          spec:
          - api_field: key
          - api_field: value
            type: googlecloudsdk.command_lib.datalineage.hooks:ParseAttributeValue

  request:
    collection: datalineage.projects.locations.processes.runs
    method: patch

  update:
    read_modify_update: true

  output:
    format: yaml
