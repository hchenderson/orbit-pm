release_tracks: [ALPHA]

help_text:
  brief: |
    Import a TelemetryPolicy.
  description: |
    Import a TelemetryPolicy.
  examples: |
    To import a TelemetryPolicy named 'my-telemetry-policy' from a YAML file, run:

      $ {command} my-telemetry-policy --source=my-telemetry-policy.yaml --location=global

request:
  collection: networkservices.projects.locations.telemetryPolicies
  ALPHA:
    api_version: v1alpha1

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:telemetryPolicy
    help_text: |
      Name of the telemetry policy to import.

async:
  collection: networkservices.projects.locations.operations

import:
  abort_if_equivalent: true
  create_if_not_exists: true
  create_request:
    collection: networkservices.projects.locations.telemetryPolicies
    ALPHA:
      api_version: v1alpha1
    method: create
