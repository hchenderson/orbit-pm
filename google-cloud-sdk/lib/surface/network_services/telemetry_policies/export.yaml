release_tracks: [ALPHA]

help_text:
  brief: |
    Export a TelemetryPolicy.
  description: |
    Export a TelemetryPolicy.
  examples: |
    To export a TelemetryPolicy named 'my-telemetry-policy' to a YAML file, run:

      $ {command} my-telemetry-policy --destination=my-telemetry-policy.yaml --location=global

request:
  collection: networkservices.projects.locations.telemetryPolicies
  ALPHA:
    api_version: v1alpha1

arguments:
  resource:
    spec: !REF googlecloudsdk.command_lib.network_services.resources:telemetryPolicy
    help_text: |
      Name of the telemetry policy to export.
