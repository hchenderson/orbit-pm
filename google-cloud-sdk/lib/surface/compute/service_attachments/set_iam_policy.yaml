release_tracks: [ALPHA, BETA, GA, PREVIEW]

help_text:
  brief: Set the IAM policy for a Compute Engine service attachment.
  description: |
    Sets the IAM policy for the given service attachment as defined in a JSON or YAML file.

  examples: |
    The following command will read an IAM policy defined in a JSON file
    'policy.json' and set it for the service attachment `my-service-attachment`:

      $ {command} my-service-attachment --region=REGION policy.json

    See https://cloud.google.com/iam/docs/managing-policies for details of the
    policy file format and contents.

request:
  collection: compute.serviceAttachments
  api_version: v1
  use_relative_name: false
  modify_request_hooks:
  - googlecloudsdk.command_lib.iam.hooks:UseMaxRequestedPolicyVersion:api_field=regionSetPolicyRequest.policy.version
  BETA:
    api_version: beta
  ALPHA:
    api_version: alpha

iam:
  set_iam_policy_request_path: regionSetPolicyRequest
  message_type_overrides:
    policy: Policy
    set_iam_policy_request: ComputeServiceAttachmentsSetIamPolicyRequest

arguments:
  resource:
    help_text: The service attachment to set the IAM policy for.
    spec: !REF googlecloudsdk.command_lib.compute.resources:service_attachment
