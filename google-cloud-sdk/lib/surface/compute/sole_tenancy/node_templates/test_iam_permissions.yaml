- release_tracks: [ALPHA, BETA, GA, PREVIEW]
  help_text:
    brief: Test IAM permissions for a Compute Engine sole-tenancy node template.
    description: |
      Returns permissions that a caller has on the specified node template.
    examples: |
      To test if the caller has 'compute.nodeTemplates.get' permission on a node template, run:

        $ {command} my-node-template --region=REGION --permissions=compute.nodeTemplates.get

  request:
    collection: compute.nodeTemplates
    api_version: v1
    method: testIamPermissions
    use_relative_name: false
    BETA:
      api_version: beta
    ALPHA:
      api_version: alpha

  command_type: GENERIC

  arguments:
    resource:
      help_text: The node template for which to test permissions.
      spec: !REF googlecloudsdk.command_lib.compute.resources:node_template
    params:
    - arg_name: permissions
      api_field: testPermissionsRequest.permissions
      required: true
      repeated: true
      help_text: |-
        Permissions to be tested.
