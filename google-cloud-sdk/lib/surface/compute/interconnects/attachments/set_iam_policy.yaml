release_tracks: [ALPHA]

help_text:
  brief: Set the IAM policy for a Compute Engine interconnect attachment.
  description: |
    Sets the IAM policy for the given interconnect attachment as defined in a JSON or YAML file.

  examples: |
    The following command will read an IAM policy defined in a JSON file
    'policy.json' and set it for the interconnect attachment `my-attachment`:

      $ {command} my-attachment --region=REGION policy.json

    See https://cloud.google.com/iam/docs/managing-policies for details of the
    policy file format and contents.

request:
  collection: compute.interconnectAttachments
  api_version: alpha
  use_relative_name: false
  modify_request_hooks:
  - googlecloudsdk.command_lib.iam.hooks:UseMaxRequestedPolicyVersion:api_field=regionSetPolicyRequest.policy.version

iam:
  set_iam_policy_request_path: regionSetPolicyRequest
  message_type_overrides:
    policy: Policy
    set_iam_policy_request: ComputeInterconnectAttachmentsSetIamPolicyRequest

arguments:
  resource:
    help_text: The interconnect attachment to set the IAM policy for.
    spec: !REF googlecloudsdk.command_lib.compute.resources:interconnect_attachment
